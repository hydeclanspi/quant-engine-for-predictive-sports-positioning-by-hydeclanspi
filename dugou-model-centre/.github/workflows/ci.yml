name: CI

# 在推送到主分支以及针对主分支的 PR 上运行质量门禁：
# 代码规范（ESLint） → 单元测试（Vitest） → 生产构建（Vite）。
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# 同一分支的新提交会取消仍在排队/运行的旧流水线，节省额度。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
